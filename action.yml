name: "Auto PR Conflict Resolver"
description: "Automatically resolves merge conflicts in pull requests using a defined strategy"
author: "DisabledAbel"

inputs:
  strategy:
    description: "Merge strategy: ours or theirs"
    required: false
    default: "theirs"

runs:
  using: "composite"
  steps:
    - name: Merge with strategy
      shell: bash
      run: |
        git fetch origin main
        git merge -X ${{ inputs.strategy }} origin/main || true

    - name: Push changes
      shell: bash
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git push
