name: Update Weekly Worked Repos

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update weekly repositories section
        uses: actions/github-script@v7
        env:
          PROFILE_USERNAME: DisabledAbel
        with:
          script: |
            const fs = require('fs');
            const username = process.env.PROFILE_USERNAME || context.repo.owner;
            const now = new Date();
            const oneWeekAgo = new Date(now);
            oneWeekAgo.setUTCDate(now.getUTCDate() - 7);
            const query = `
              query($login: String!, $from: DateTime!, $to: DateTime!) {
                user(login: $login) {
                  contributionsCollection(from: $from, to: $to) {
                    commitContributionsByRepository {
                      repository { nameWithOwner url }
                    }
                    pullRequestContributionsByRepository {
                      repository { nameWithOwner url }
                    }
                    issueContributionsByRepository {
                      repository { nameWithOwner url }
                    }
                    pullRequestReviewContributionsByRepository {
                      repository { nameWithOwner url }
                    }
                    repositoryContributions(first: 100) {
                      nodes {
                        repository { nameWithOwner url }
                      }
                    }
                  }
                }
              }
            `;
            const response = await github.graphql(query, {
              login: username,
              from: oneWeekAgo.toISOString(),
              to: now.toISOString()
            });
            const collection = response.user?.contributionsCollection;
            if (!collection) {
              core.setFailed(`Could not load contributions for ${username}.`);
              return;
            }
            const repoMap = new Map();
            const addRepo = (repo) => {
              if (!repo?.nameWithOwner || !repo?.url) return;
              repoMap.set(repo.nameWithOwner, repo.url);
            };
            for (const item of collection.commitContributionsByRepository || []) addRepo(item.repository);
            for (const item of collection.pullRequestContributionsByRepository || []) addRepo(item.repository);
            for (const item of collection.issueContributionsByRepository || []) addRepo(item.repository);
            for (const item of collection.pullRequestReviewContributionsByRepository || []) addRepo(item.repository);
            for (const node of collection.repositoryContributions?.nodes || []) addRepo(node.repository);
            const repos = [...repoMap.entries()]
              .sort((a, b) => a[0].localeCompare(b[0]))
              .map(([name, url]) => `- [\`${name}\`](${url})`);
            const startMarker = '<!-- weekly-repos:start -->';
            const endMarker = '<!-- weekly-repos:end -->';
            const readmePath = 'README.md';
            const readme = fs.readFileSync(readmePath, 'utf8');
            if (!readme.includes(startMarker) || !readme.includes(endMarker)) {
              core.setFailed(`README is missing ${startMarker}/${endMarker} markers.`);
              return;
            }
            const body = repos.length
              ? repos.join('\n')
              : '- No public repo activity in the last 7 days (yet ✨)';
            const updated = readme.replace(
              new RegExp(`${startMarker}[\\s\\S]*?${endMarker}`, 'm'),
              `${startMarker}\n${body}\n${endMarker}`
            );
            fs.writeFileSync(readmePath, updated);
            core.info(`Updated weekly repo list with ${repos.length} repositories.`);
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update weekly worked repos"
          file_pattern: README.md
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
